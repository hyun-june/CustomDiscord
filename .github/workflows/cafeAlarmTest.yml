name: CafeAlarm Test

on:
  workflow_dispatch:

  push:
    paths:
      - "CafeAlarm/**"
      - ".github/workflows/cafeAlarmTest.yml"

  pull_request:
    paths:
      - "CafeAlarm/**"
      - ".github/workflows/cafeAlarmTest.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: CafeAlarm

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: CafeAlarm/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: node --test tests/*.test.js
